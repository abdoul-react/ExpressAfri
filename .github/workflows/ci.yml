name: CI
on: [push, pull_request]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install API dependencies
        run: |
          cd apps/api
          npm ci
      - name: Wait for Postgres
        run: |
          sudo apt-get update -y && sudo apt-get install -y postgresql-client
          for i in {1..60}; do pg_isready -h localhost && break || sleep 1; done
      - name: Pre-migration diagnostics
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
        run: |
          echo "DATABASE_URL=$DATABASE_URL"
          echo "psql version:"; psql --version || true
          echo "Listing DB tables (may fail if DB not ready):";
          psql "$DATABASE_URL" -c '\dt' || true
          echo "Drizzle journal (if exists):";
          ls -la apps/api/drizzle || true
          if [ -f apps/api/drizzle/meta/_journal.json ]; then echo '--- journal ---'; sed -n '1,200p' apps/api/drizzle/meta/_journal.json || true; echo '--- end journal ---'; fi
      - name: Run DB migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
        run: |
          cd apps/api
          echo "Running drizzle migrate (showing config and listing pending files)"
          node -e "console.log('drizzle cfg URL env:', process.env.DATABASE_URL || 'none')"
          ls -la drizzle || true
          npm run migrate
      - name: Lint
        run: |
          cd apps/api
          npm run lint
      - name: Unit tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
          NODE_ENV: test
        run: |
          cd apps/api
          npm test -- --runInBand --ci
      - name: E2E tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
          NODE_ENV: test
        run: |
          cd apps/api
          npm run test:e2e -- --ci

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install mobile deps and typecheck
        run: |
          npm ci --legacy-peer-deps
          npx tsc --noEmit

  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install admin deps and build
        run: |
          cd apps/admin
          npm ci
          npm run build
