name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci
          cd apps/api && npm ci
      - name: Check architecture
        run: npm run check:arch
      - name: Lint root
        run: npm run lint -- --no-fix
      - name: Lint API
        run: cd apps/api && npm run lint -- --no-fix
      - name: Typecheck root
        run: npx tsc --noEmit
      - name: Typecheck API
        run: cd apps/api && npx tsc --noEmit
      - name: Audit dependencies
        run: npm audit --audit-level=high

  mobile-typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install mobile dependencies
        run: npm ci --legacy-peer-deps
      - name: Typecheck mobile
        run: npx tsc --noEmit

  migration-and-test:
    needs: lint-and-typecheck
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install API dependencies
        run: cd apps/api && npm ci
      - name: Reset test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS testdb;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE testdb;"
      - name: Run migrations
        run: cd apps/api && npm run migrate:ci
      - name: Unit tests
        run: cd apps/api && npm test -- --runInBand --ci
      - name: E2E tests
        run: cd apps/api && npm run test:e2e -- --ci

  build:
    needs: migration-and-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install API dependencies
        run: cd apps/api && npm ci
      - name: Build API
        run: cd apps/api && npm run build
      - name: Install admin dependencies
        run: cd apps/admin && npm ci
      - name: Build admin
        run: cd apps/admin && npm run build
      - name: Build Docker image
        run: docker build -t expressafri/api apps/api

  secrets-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
