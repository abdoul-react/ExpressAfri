name: CI Full

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-migrate:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb" --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        run: |
          cd apps/api
          npm ci

      - name: Wait for Postgres
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5432 -U postgres; do echo "Waiting for postgres..."; sleep 2; done

      - name: Reset test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS testdb;" || true
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE testdb;"

      - name: Show current migrations journal
        run: |
          echo "-- journal --"
          sed -n '1,200p' apps/api/drizzle/meta/_journal.json || true

      - name: Run drizzle migrations
        working-directory: apps/api
        run: |
          npm run migrate -- --preview=false || { echo "drizzle migrate failed"; exit 1; }

      - name: Run API tests
        working-directory: apps/api
        run: |
          npm run test -- --runInBand

      - name: Upload coverage (optional)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: coverage || ./coverage
